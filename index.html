<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Magic Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:50px;
gap:80px;
}

.logo{
width:160px;
margin-bottom:20px;
}

.left{
max-width:600px;
}

.left h1{
font-size:64px;
line-height:1.1;
margin-bottom:20px;
}

.left p{
font-size:20px;
opacity:.85;
margin-bottom:30px;
}

.btn{
display:inline-block;
background:#ff6b00;
color:white;
padding:15px 30px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

.poster{
width:380px;
border-radius:20px;
box-shadow:
0 20px 60px rgba(255,120,0,.4);
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-15px);
}
100%{
transform:translateY(0px);
}
}

@media(max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.left h1{
font-size:40px;
}

.poster{
width:280px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="left">

<img src="logo.png" class="logo">

<h1>
Air Bersih Untuk
Keluarga Anda
</h1>

<p>
Nikmati air panas dan sejuk segera
dengan teknologi premium SK Magic.
</p>

<a href="https://wa.me/60105332502?text=Saya%20nak%20semak%20kelayakan%20SK%20Magic" class="btn">
Semak Kelayakan
</a>

</div>

<div>

<img src="product.png" class="poster">

</div>

</section>

</body>
</html>
