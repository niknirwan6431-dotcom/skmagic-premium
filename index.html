<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Magic Premium</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial,sans-serif;
color:white;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
gap:80px;
padding:40px;
}

.logo{
width:180px;
margin-bottom:20px;
}

.content h1{
font-size:60px;
margin:0;
}

.content p{
font-size:20px;
opacity:.8;
}

.product{
width:350px;
animation:float 5s ease-in-out infinite;
filter:drop-shadow(0 30px 40px rgba(255,102,0,.4));
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0px);}
}

.btn{
display:inline-block;
padding:15px 30px;
background:#ff6600;
color:white;
text-decoration:none;
border-radius:50px;
margin-top:20px;
font-weight:bold;
}
</style>

</head>
<body>

<section class="hero">

<div class="content">

<img src="logo.png" class="logo">

<h1>Air Bersih Untuk<br>Keluarga Anda</h1>

<p>
Nikmati air panas dan sejuk segera
dengan teknologi premium SK Magic.
</p>

<a href="#" class="btn">
Semak Kelayakan
</a>

</div>

<div>

<img src="product.png" class="product">

</div>

</section>

</body>
</html>
